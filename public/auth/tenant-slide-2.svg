<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-label="Cooperative operations approvals notifications and audit-ready tracking">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.48" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0.06)"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="rgba(0,0,0,0.34)"/>
    </filter>
    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1600" height="1200" fill="url(#bg)"/>
  <circle cx="340" cy="240" r="240" fill="rgba(255,255,255,0.10)" filter="url(#blur)"/>
  <circle cx="1320" cy="350" r="310" fill="rgba(255,255,255,0.08)" filter="url(#blur)"/>
  <circle cx="980" cy="1060" r="380" fill="rgba(255,255,255,0.06)" filter="url(#blur)"/>

  <!-- Main operations dashboard canvas -->
  <g transform="translate(150 160)" filter="url(#shadow)">
    <rect x="0" y="0" width="1300" height="880" rx="64" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.16)"/>
    <rect x="36" y="36" width="1228" height="808" rx="54" fill="rgba(17,24,39,0.40)" stroke="rgba(255,255,255,0.10)"/>

    <!-- Top nav -->
    <g transform="translate(84 86)">
      <rect x="0" y="0" width="360" height="18" rx="9" fill="rgba(255,255,255,0.44)"/>
      <rect x="0" y="36" width="260" height="12" rx="6" fill="rgba(255,255,255,0.22)"/>
      <g transform="translate(980 0)">
        <circle cx="64" cy="30" r="24" fill="rgba(99,102,241,0.26)" stroke="rgba(99,102,241,0.40)"/>
        <path d="M64 14 C54 20 50 30 50 42 C50 54 58 62 64 62 C70 62 78 54 78 42 C78 30 74 20 64 14 Z" fill="rgba(255,255,255,0.45)"/>
        <circle cx="82" cy="16" r="10" fill="rgba(34,197,94,0.85)"/>
      </g>
    </g>

    <!-- Left column: approvals queue -->
    <g transform="translate(84 190)">
      <rect x="0" y="0" width="520" height="620" rx="44" fill="url(#glass)" stroke="rgba(255,255,255,0.18)"/>
      <rect x="44" y="44" width="240" height="14" rx="7" fill="rgba(255,255,255,0.44)"/>
      <rect x="44" y="76" width="180" height="12" rx="6" fill="rgba(255,255,255,0.22)"/>

      <!-- Approval cards -->
      <g transform="translate(44 126)">
        <g transform="translate(0 0)">
          <rect x="0" y="0" width="432" height="118" rx="26" fill="rgba(17,24,39,0.35)" stroke="rgba(255,255,255,0.12)"/>
          <circle cx="44" cy="58" r="22" fill="rgba(245,158,11,0.28)" stroke="rgba(245,158,11,0.42)"/>
          <path d="M44 46 v26" stroke="rgba(255,255,255,0.75)" stroke-width="4" stroke-linecap="round"/>
          <path d="M34 56 h20" stroke="rgba(255,255,255,0.75)" stroke-width="4" stroke-linecap="round"/>
          <rect x="82" y="38" width="210" height="12" rx="6" fill="rgba(255,255,255,0.40)"/>
          <rect x="82" y="62" width="150" height="10" rx="5" fill="rgba(255,255,255,0.22)"/>
          <g transform="translate(300 34)">
            <rect x="0" y="0" width="108" height="34" rx="17" fill="rgba(34,197,94,0.22)" stroke="rgba(34,197,94,0.42)"/>
            <path d="M24 18 l8 8 l14-18" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          </g>
        </g>
        <g transform="translate(0 140)">
          <rect x="0" y="0" width="432" height="118" rx="26" fill="rgba(17,24,39,0.35)" stroke="rgba(255,255,255,0.12)"/>
          <circle cx="44" cy="58" r="22" fill="rgba(99,102,241,0.26)" stroke="rgba(99,102,241,0.44)"/>
          <path d="M36 58 l8 8 l16-20" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          <rect x="82" y="38" width="230" height="12" rx="6" fill="rgba(255,255,255,0.40)"/>
          <rect x="82" y="62" width="170" height="10" rx="5" fill="rgba(255,255,255,0.22)"/>
          <g transform="translate(300 34)">
            <rect x="0" y="0" width="108" height="34" rx="17" fill="rgba(245,158,11,0.18)" stroke="rgba(245,158,11,0.40)"/>
            <path d="M32 18 h44" stroke="rgba(255,255,255,0.80)" stroke-width="4" stroke-linecap="round"/>
          </g>
        </g>
        <g transform="translate(0 280)">
          <rect x="0" y="0" width="432" height="118" rx="26" fill="rgba(17,24,39,0.35)" stroke="rgba(255,255,255,0.12)"/>
          <circle cx="44" cy="58" r="22" fill="rgba(34,197,94,0.20)" stroke="rgba(34,197,94,0.42)"/>
          <path d="M36 58 h16" stroke="rgba(255,255,255,0.75)" stroke-width="4" stroke-linecap="round"/>
          <path d="M44 50 v16" stroke="rgba(255,255,255,0.75)" stroke-width="4" stroke-linecap="round"/>
          <rect x="82" y="38" width="200" height="12" rx="6" fill="rgba(255,255,255,0.40)"/>
          <rect x="82" y="62" width="150" height="10" rx="5" fill="rgba(255,255,255,0.22)"/>
          <g transform="translate(300 34)">
            <rect x="0" y="0" width="108" height="34" rx="17" fill="rgba(99,102,241,0.20)" stroke="rgba(99,102,241,0.40)"/>
            <circle cx="28" cy="17" r="6" fill="rgba(255,255,255,0.80)"/>
            <circle cx="54" cy="17" r="6" fill="rgba(255,255,255,0.55)"/>
            <circle cx="80" cy="17" r="6" fill="rgba(255,255,255,0.35)"/>
          </g>
        </g>
      </g>
    </g>

    <!-- Right column: notifications + audit trail -->
    <g transform="translate(650 190)">
      <rect x="0" y="0" width="614" height="372" rx="44" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.16)"/>
      <rect x="44" y="44" width="260" height="14" rx="7" fill="rgba(255,255,255,0.44)"/>
      <rect x="44" y="76" width="200" height="12" rx="6" fill="rgba(255,255,255,0.22)"/>

      <g transform="translate(44 126)">
        <g transform="translate(0 0)">
          <rect x="0" y="0" width="526" height="74" rx="24" fill="rgba(17,24,39,0.35)" stroke="rgba(255,255,255,0.12)"/>
          <circle cx="34" cy="37" r="10" fill="rgba(34,197,94,0.85)"/>
          <rect x="58" y="24" width="260" height="12" rx="6" fill="rgba(255,255,255,0.40)"/>
          <rect x="58" y="44" width="200" height="10" rx="5" fill="rgba(255,255,255,0.20)"/>
          <rect x="440" y="26" width="66" height="22" rx="11" fill="rgba(34,197,94,0.22)" stroke="rgba(34,197,94,0.42)"/>
        </g>
        <g transform="translate(0 92)">
          <rect x="0" y="0" width="526" height="74" rx="24" fill="rgba(17,24,39,0.35)" stroke="rgba(255,255,255,0.12)"/>
          <circle cx="34" cy="37" r="10" fill="rgba(245,158,11,0.85)"/>
          <rect x="58" y="24" width="280" height="12" rx="6" fill="rgba(255,255,255,0.40)"/>
          <rect x="58" y="44" width="220" height="10" rx="5" fill="rgba(255,255,255,0.20)"/>
          <rect x="432" y="26" width="74" height="22" rx="11" fill="rgba(245,158,11,0.18)" stroke="rgba(245,158,11,0.42)"/>
        </g>
        <g transform="translate(0 184)">
          <rect x="0" y="0" width="526" height="74" rx="24" fill="rgba(17,24,39,0.35)" stroke="rgba(255,255,255,0.12)"/>
          <circle cx="34" cy="37" r="10" fill="rgba(99,102,241,0.85)"/>
          <rect x="58" y="24" width="300" height="12" rx="6" fill="rgba(255,255,255,0.40)"/>
          <rect x="58" y="44" width="210" height="10" rx="5" fill="rgba(255,255,255,0.20)"/>
          <rect x="448" y="26" width="58" height="22" rx="11" fill="rgba(99,102,241,0.20)" stroke="rgba(99,102,241,0.42)"/>
        </g>
      </g>
    </g>

    <!-- Bottom: audit trail timeline -->
    <g transform="translate(650 602)">
      <rect x="0" y="0" width="614" height="208" rx="44" fill="url(#glass)" stroke="rgba(255,255,255,0.18)"/>
      <rect x="44" y="44" width="180" height="14" rx="7" fill="rgba(255,255,255,0.44)"/>
      <g transform="translate(44 86)" fill="none" stroke-linecap="round" stroke-width="6">
        <path d="M18 32 H526" stroke="rgba(255,255,255,0.22)"/>
        <circle cx="18" cy="32" r="10" fill="rgba(34,197,94,0.85)"/>
        <circle cx="196" cy="32" r="10" fill="rgba(245,158,11,0.85)"/>
        <circle cx="372" cy="32" r="10" fill="rgba(99,102,241,0.85)"/>
        <circle cx="526" cy="32" r="10" fill="rgba(34,197,94,0.85)"/>
      </g>
      <g transform="translate(44 142)">
        <rect x="0" y="0" width="520" height="12" rx="6" fill="rgba(255,255,255,0.22)"/>
        <rect x="0" y="26" width="460" height="12" rx="6" fill="rgba(255,255,255,0.20)"/>
      </g>
    </g>
  </g>
</svg>
