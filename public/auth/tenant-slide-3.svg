<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-label="Gold and silver pool investments with debit orders and loan applications">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.45" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(255,255,255,0.16)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0.06)"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="0.55" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="silver" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e5e7eb"/>
      <stop offset="0.55" stop-color="#94a3b8"/>
      <stop offset="1" stop-color="#475569"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="rgba(0,0,0,0.34)"/>
    </filter>
    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1600" height="1200" fill="url(#bg)"/>
  <circle cx="330" cy="250" r="240" fill="rgba(255,255,255,0.09)" filter="url(#blur)"/>
  <circle cx="1320" cy="340" r="320" fill="rgba(255,255,255,0.07)" filter="url(#blur)"/>
  <circle cx="980" cy="1060" r="390" fill="rgba(255,255,255,0.06)" filter="url(#blur)"/>

  <!-- Investment / pool summary scene -->
  <g transform="translate(150 170)" filter="url(#shadow)">
    <rect x="0" y="0" width="1300" height="860" rx="64" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.16)"/>
    <rect x="36" y="36" width="1228" height="788" rx="54" fill="rgba(17,24,39,0.42)" stroke="rgba(255,255,255,0.10)"/>

    <!-- Gold pool card -->
    <g transform="translate(84 100)">
      <rect x="0" y="0" width="560" height="330" rx="44" fill="url(#glass)" stroke="rgba(255,255,255,0.18)"/>
      <rect x="44" y="44" width="220" height="14" rx="7" fill="rgba(255,255,255,0.44)"/>
      <rect x="44" y="76" width="160" height="12" rx="6" fill="rgba(255,255,255,0.22)"/>
      <g transform="translate(44 118)">
        <rect x="0" y="0" width="472" height="150" rx="34" fill="rgba(17,24,39,0.35)" stroke="rgba(255,255,255,0.12)"/>
        <g transform="translate(34 34)">
          <circle cx="56" cy="44" r="44" fill="rgba(245,158,11,0.20)"/>
          <circle cx="56" cy="44" r="36" fill="url(#gold)"/>
          <path d="M44 44 h24" stroke="rgba(17,24,39,0.55)" stroke-width="6" stroke-linecap="round"/>
          <path d="M56 32 v24" stroke="rgba(17,24,39,0.55)" stroke-width="6" stroke-linecap="round"/>
          <rect x="128" y="22" width="260" height="14" rx="7" fill="rgba(255,255,255,0.44)"/>
          <rect x="128" y="52" width="210" height="12" rx="6" fill="rgba(255,255,255,0.22)"/>
          <g transform="translate(128 86)">
            <rect x="0" y="0" width="300" height="12" rx="6" fill="rgba(255,255,255,0.18)"/>
            <rect x="0" y="0" width="192" height="12" rx="6" fill="rgba(245,158,11,0.60)"/>
          </g>
        </g>
      </g>
    </g>

    <!-- Silver pool card -->
    <g transform="translate(692 100)">
      <rect x="0" y="0" width="572" height="330" rx="44" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.16)"/>
      <rect x="44" y="44" width="220" height="14" rx="7" fill="rgba(255,255,255,0.44)"/>
      <rect x="44" y="76" width="180" height="12" rx="6" fill="rgba(255,255,255,0.22)"/>
      <g transform="translate(44 118)">
        <rect x="0" y="0" width="484" height="150" rx="34" fill="rgba(17,24,39,0.35)" stroke="rgba(255,255,255,0.12)"/>
        <g transform="translate(34 34)">
          <circle cx="56" cy="44" r="44" fill="rgba(148,163,184,0.18)"/>
          <circle cx="56" cy="44" r="36" fill="url(#silver)"/>
          <path d="M42 52 C56 36 68 36 72 52" fill="none" stroke="rgba(17,24,39,0.55)" stroke-width="6" stroke-linecap="round"/>
          <rect x="128" y="22" width="260" height="14" rx="7" fill="rgba(255,255,255,0.44)"/>
          <rect x="128" y="52" width="220" height="12" rx="6" fill="rgba(255,255,255,0.22)"/>
          <g transform="translate(128 86)">
            <rect x="0" y="0" width="300" height="12" rx="6" fill="rgba(255,255,255,0.18)"/>
            <rect x="0" y="0" width="156" height="12" rx="6" fill="rgba(148,163,184,0.62)"/>
          </g>
        </g>
      </g>
    </g>

    <!-- Lower row: debit orders + loans -->
    <g transform="translate(84 470)">
      <rect x="0" y="0" width="1180" height="320" rx="54" fill="url(#glass)" stroke="rgba(255,255,255,0.18)"/>
      <rect x="44" y="44" width="260" height="14" rx="7" fill="rgba(255,255,255,0.44)"/>
      <rect x="44" y="76" width="220" height="12" rx="6" fill="rgba(255,255,255,0.22)"/>

      <!-- Two action tiles -->
      <g transform="translate(44 128)">
        <rect x="0" y="0" width="540" height="170" rx="40" fill="rgba(17,24,39,0.35)" stroke="rgba(255,255,255,0.12)"/>
        <g transform="translate(40 44)">
          <circle cx="42" cy="42" r="36" fill="rgba(34,197,94,0.22)" stroke="rgba(34,197,94,0.42)"/>
          <path d="M30 42 h24" stroke="rgba(255,255,255,0.80)" stroke-width="5" stroke-linecap="round"/>
          <path d="M42 30 v24" stroke="rgba(255,255,255,0.80)" stroke-width="5" stroke-linecap="round"/>
          <rect x="110" y="20" width="260" height="14" rx="7" fill="rgba(255,255,255,0.44)"/>
          <rect x="110" y="48" width="220" height="12" rx="6" fill="rgba(255,255,255,0.22)"/>
        </g>
        <g transform="translate(420 62)">
          <rect x="0" y="0" width="92" height="44" rx="22" fill="rgba(34,197,94,0.22)" stroke="rgba(34,197,94,0.42)"/>
          <path d="M26 23 l8 8 l16-18" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
      </g>

      <g transform="translate(596 128)">
        <rect x="0" y="0" width="540" height="170" rx="40" fill="rgba(17,24,39,0.35)" stroke="rgba(255,255,255,0.12)"/>
        <g transform="translate(40 44)">
          <circle cx="42" cy="42" r="36" fill="rgba(99,102,241,0.22)" stroke="rgba(99,102,241,0.42)"/>
          <path d="M32 52 C40 36 58 36 66 52" fill="none" stroke="rgba(255,255,255,0.80)" stroke-width="5" stroke-linecap="round"/>
          <path d="M34 64 h30" stroke="rgba(255,255,255,0.80)" stroke-width="5" stroke-linecap="round"/>
          <rect x="110" y="20" width="260" height="14" rx="7" fill="rgba(255,255,255,0.44)"/>
          <rect x="110" y="48" width="220" height="12" rx="6" fill="rgba(255,255,255,0.22)"/>
        </g>
        <g transform="translate(420 62)">
          <rect x="0" y="0" width="92" height="44" rx="22" fill="rgba(245,158,11,0.18)" stroke="rgba(245,158,11,0.42)"/>
          <path d="M26 23 h40" stroke="rgba(255,255,255,0.85)" stroke-width="4" stroke-linecap="round"/>
        </g>
      </g>
    </g>
  </g>
</svg>
